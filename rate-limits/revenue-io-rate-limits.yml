name: Revenue.io Rate Limits
description: Revenue.io does not publish specific API rate limit thresholds in its
  public documentation. Rate limits are enforced on the REST API for guided selling
  endpoints and CRM synchronization calls. Limits may vary by plan tier and are
  subject to change. Contact Revenue.io support for plan-specific rate limit details.
url: https://support.revenue.io/
created: '2026-06-13'
modified: '2026-06-13'
rateLimits:
  - name: REST API
    description: General rate limits applied to REST API requests for guided selling,
      call analytics, and CRM synchronization endpoints.
    type: api
    scope: account
    published: false
    notes: Specific thresholds are not publicly documented; contact Revenue.io support
      for details applicable to your subscription tier.
  - name: Salesforce CRM Sync
    description: Rate limits applicable to Salesforce CRM data synchronization
      calls, which are additionally constrained by Salesforce API governor limits.
    type: integration
    scope: account
    published: false
    notes: Subject to both Revenue.io limits and Salesforce API governor limits
      (typically 15,000 API calls per 24-hour period for Enterprise edition).
  - name: Conversation AI Transcription
    description: Rate limits for real-time transcription and conversation intelligence
      processing requests.
    type: feature
    scope: account
    published: false
    notes: Constrained by available processing capacity; no public thresholds documented.
references:
  - name: Revenue.io Knowledge Center
    url: https://support.revenue.io/
  - name: Revenue.io Status Page
    url: https://status.revenue.io/
